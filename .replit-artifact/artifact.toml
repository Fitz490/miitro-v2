kind = "web"
previewPath = "/"
title = "Red Shield"
version = "1.0.0"
id = "artifacts/red-shield"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21812

[services.development]
run = "pnpm --filter @workspace/red-shield run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/red-shield", "run", "build" ]
publicDir = "artifacts/red-shield/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21812"
BASE_PATH = "/"
